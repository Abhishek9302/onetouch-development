# Auto-generated by Zero-Human for reliable Next.js deploys on Railway.
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = [
  "npm run build",
  "if [ -d .next/standalone ]; then cp -r public .next/standalone/ 2>/dev/null || true; cp -r .next/static .next/standalone/.next/ 2>/dev/null || true; fi",
]

[start]
cmd = "if [ -f .next/standalone/server.js ]; then HOSTNAME=0.0.0.0 node .next/standalone/server.js; else npx next start -H 0.0.0.0 -p ${PORT:-8080}; fi"
