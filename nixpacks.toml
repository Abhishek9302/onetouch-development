# Auto-generated by Zero-Human for reliable Next.js deploys on Railway.
#
# 1) Install devDependencies so Tailwind/PostCSS/TypeScript compile (Railway
#    builds with NODE_ENV=production, which would otherwise skip them → no CSS).
# 2) After build, if Next.js produced a standalone server, copy the static +
#    public assets next to it (standalone does NOT include them → /_next 404s).
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = [
  "npm run build",
  "if [ -d .next/standalone ]; then cp -r public .next/standalone/ 2>/dev/null || true; cp -r .next/static .next/standalone/.next/ 2>/dev/null || true; fi",
]

[start]
cmd = "if [ -f .next/standalone/server.js ]; then HOSTNAME=0.0.0.0 node .next/standalone/server.js; else npx next start -H 0.0.0.0 -p ${PORT:-8080}; fi"
